<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <!-- Terminal rendering of a real chrond session (output copied verbatim
       from a container run on 2026-07-08; timestamps are from that run). -->
  <rect width="1060" height="560" rx="10" fill="#1c2128"/>
  <rect width="1060" height="34" rx="10" fill="#2d333b"/>
  <rect y="24" width="1060" height="10" fill="#2d333b"/>
  <circle cx="20" cy="17" r="6" fill="#f47067"/>
  <circle cx="40" cy="17" r="6" fill="#e0b543"/>
  <circle cx="60" cy="17" r="6" fill="#57ab5a"/>
  <text x="530" y="22" text-anchor="middle" fill="#909dab">chrond — did last night's backup run?</text>

  <g fill="#adbac7">
    <text x="24" y="66"><tspan fill="#6cb6ff">$</tspan> chrond run --file mycrontab   <tspan fill="#768390"># daemon restarts after overnight downtime</tspan></text>
    <text x="24" y="92" fill="#768390">[chrond] 2026-07-08T21:57:50 starting: 1 job(s) from mycrontab</text>
    <text x="24" y="118" fill="#e0b543">[chrond] 2026-07-08T21:57:50 job nightly-backup missed occurrence 2026-07-07T02:15:00</text>
    <text x="24" y="144" fill="#768390">[chrond] 2026-07-08T21:57:50 job nightly-backup started (scheduled 2026-07-08T02:15:00) (catch-up)</text>
    <text x="24" y="170" fill="#57ab5a">[chrond] 2026-07-08T21:57:51 job nightly-backup finished: ok (exit 0, 50ms)</text>

    <text x="24" y="222"><tspan fill="#6cb6ff">$</tspan> chrond runs</text>
    <text x="24" y="250" fill="#909dab">JOB             SCHEDULED            STATUS           EXIT   DURATION</text>
    <text x="24" y="276"><tspan fill="#e0b543">nightly-backup  2026-07-07T02:15:00  missed              -          -</tspan></text>
    <text x="24" y="302"><tspan fill="#57ab5a">nightly-backup  2026-07-08T02:15:00  ok (catch-up)       0       50ms</tspan></text>

    <text x="24" y="354"><tspan fill="#6cb6ff">$</tspan> chrond status --file mycrontab</text>
    <text x="24" y="382" fill="#909dab">JOB             LAST SCHEDULED       STATUS           EXIT  NEXT RUN</text>
    <text x="24" y="408">nightly-backup  2026-07-08T02:15:00  <tspan fill="#57ab5a">ok</tspan>                  0  2026-07-09T02:15:00</text>

    <text x="24" y="460"><tspan fill="#6cb6ff">$</tspan> curl -s http://127.0.0.1:9090/metrics | grep nightly</text>
    <text x="24" y="488" fill="#96d0ff">chrond_job_runs_total{job="nightly-backup",status="missed"} 1</text>
    <text x="24" y="514" fill="#96d0ff">chrond_job_runs_total{job="nightly-backup",status="ok"} 1</text>
    <text x="24" y="540" fill="#96d0ff">chrond_job_last_run_duration_seconds{job="nightly-backup"} 0.05</text>
  </g>
</svg>
